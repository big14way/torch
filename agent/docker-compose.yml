# Torch executor on Phala Cloud (Intel TDX enclave via dstack).
# Paste into Phala Cloud -> Deploy -> docker-compose.yml.
#
# The executor key is GENERATED INSIDE the enclave (no key in this file).
# Set HL_PRIVATE_KEY as a Phala "Encrypted Secret" (end-to-end encrypted); it is
# referenced below. Read the CVM serial log for the executor address, then run
# `EXECUTOR_NEW=0x... npm run set:executor -w contracts` to authorize it.
services:
  executor:
    image: ghcr.io/big14way/torch-executor:latest
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      PORT: "3000"
      ENCLAVE_KEYGEN: "1"
      DSTACK: "1"
      # mock while the league runs (fills at the FTSO mark; the enclave has no
      # exchange egress yet). Flip to "testnet" to route real Hyperliquid
      # testnet orders once egress is granted and smoke-tested.
      EXECUTION_MODE: mock
      RPC_URL: https://coston2.enosys.global/ext/C/rpc
      HL_API_URL: https://api.hyperliquid-testnet.xyz
      HL_PRIVATE_KEY: ${HL_PRIVATE_KEY}
