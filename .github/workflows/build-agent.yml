name: Build executor image

# Builds the Torch executor container and pushes it to GitHub Container Registry
# (ghcr.io/<owner>/torch-executor:latest) so a TEE host (Phala Cloud / Confidential
# Space) can pull it. No local Docker needed.
on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/build-agent.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./agent
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/torch-executor:latest
